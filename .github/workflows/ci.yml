name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build · Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # TODO: drop continue-on-error once the ~140 pre-existing lint errors
      # (no-explicit-any, empty blocks, etc. — accumulated before CI existed) are fixed.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck + build
        run: npm run build

      - name: Unit tests (Jest)
        run: npm run test -- --ci

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3

  e2e:
    name: E2E tests (Cypress)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Serve production build
        run: npx --yes vite preview --port 5173 --strictPort &

      - name: Wait for server
        run: npx --yes wait-on http://localhost:5173 --timeout 60000

      - name: Run Cypress
        run: npm run cypress:run

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 5
